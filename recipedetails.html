<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <!-- CHANGED: allows media queries to work -->
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap" rel="stylesheet">
    <title>Knights of the Grill - Chad TV</title>
    <link rel="icon" type="image/x-icon" href="logo.png">

</head>

<body>
    <header>
        <div id="headerdiv">

            <div class="image-flipper-container">
                <div class="card-inner">
                    <div class="card-front">
                        <img src="logo.png" id="logo" alt="logo">
                    </div>
                    <div class="card-back">
                        <a href="index.html"> <img src="FinalNanoLogo.png" id="logo" alt="logo"></a>

                    </div>
                </div>
            </div>
            <h1>Knights of the Grill</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="recipelist.html">Recipes</a></li>
                <!-- CHANGED: added Favorites nav link -->
                <li><a href="favorites.html">Favorites</a></li>
                <li><a href="todo.html">ToDo</a></li>
            </ul>

            <button class="btn cube timer-nav-btn" id="open-timer-btn" type="button">
                <div class="bg-top"><div class="bg-inner"></div></div>
                <div class="bg-right"><div class="bg-inner"></div></div>
                <div class="bg"><div class="bg-inner"></div></div>
                <div class="text">⏲️ Cook Timer</div>
            </button>
            <button id="theme-switch">
                Turn on Knight Time
            </button>
        </nav>
    </header>

    <main>
        <button class="navbutton">
            <a href="index.html" title="Homepage">Go Home</a>
        </button>


        <!-- floating draggable timer window -->
        <div id="timer-window" style="display:none;">

            <!-- title bar - grab and drag from here -->
            <div id="timer-titlebar">
                <span id="timer-title">Knights of the Grill - Cook Timer</span>
                <div id="titlebar-controls">
                    <button id="minimize-btn" title="Minimize">-</button>
                    <button id="close-btn" title="Close">x</button>
                </div>
            </div>

            <!-- cooking timer - hidden when minimized -->
            <div id="timer-body">

                <p id="timer-message">Awaiting your sigma cooking orders...</p>

                <!-- editable HH:MM:SS display -->
                <div id="timer-display">
                    <div class="time-segment-group">
                        <input type="number" id="input-hours" class="time-segment" value="00" min="0" max="99">
                        <span class="time-label">Hours</span>
                    </div>

                    <span class="time-sep">:</span>

                    <div class="time-segment-group">
                        <input type="number" id="input-minutes" class="time-segment" value="00" min="0" max="59">
                        <span class="time-label">Minutes</span>
                    </div>

                    <span class="time-sep">:</span>

                    <div class="time-segment-group">
                        <input type="number" id="input-seconds" class="time-segment" value="00" min="0" max="59">
                        <span class="time-label">Seconds</span>
                    </div>
                </div>

                <!-- cube buttons from UIVERSE-->
                <div id="timer-controls">

                    <button class="btn cube" id="btn-start" type="button">
                    <div class="bg-top"><div class="bg-inner"></div></div>
                    <div class="bg-right"><div class="bg-inner"></div></div>
                    <div class="bg"><div class="bg-inner"></div></div>
                    <div class="text">Start</div>
                </button>

                    <button class="btn cube" id="btn-pause" type="button">
                    <div class="bg-top"><div class="bg-inner"></div></div>
                    <div class="bg-right"><div class="bg-inner"></div></div>
                    <div class="bg"><div class="bg-inner"></div></div>
                    <div class="text">Pause</div>
                </button>

                    <button class="btn cube" id="btn-reset" type="button">
                    <div class="bg-top"><div class="bg-inner"></div></div>
                    <div class="bg-right"><div class="bg-inner"></div></div>
                    <div class="bg"><div class="bg-inner"></div></div>
                    <div class="text">Reset</div>
                </button>

                </div>

                <!-- progress bar for when the timer is going -->
                <div id="progress-container">
                    <div id="progress-bar"></div>
                </div>

            </div>
        </div>

        <div id="recipe-details">

        </div>
    </main>
    <footer>
        <p><i>Knights of the Grill</i> is brought to you by Chad TV, Inc. All rights reserved. 2026
            <a href="https://github.com/MewtwoRBGY/front-end-project">GitHub Available Here</a></p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
